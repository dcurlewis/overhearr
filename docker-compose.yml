# Overhearr docker-compose example.
#
# Quick start:
#   1. Copy `.env.docker.example` -> `.env.docker` and fill in the secrets
#      (or run `./scripts/generate-secrets.sh > .env.docker`).
#   2. `docker compose --env-file .env.docker up -d`
#   3. Browse to http://<host>:5056 and complete the first-run wizard.

services:
  overhearr:
    image: ghcr.io/dcurlewis/overhearr:latest
    container_name: overhearr
    ports:
      - "5056:5056"
    volumes:
      # Holds /config/db/overhearr.db (SQLite) and any future caches.
      - ./config:/config
    environment:
      # Required — see .env.docker.example.
      SESSION_SECRET: ${SESSION_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # Optional tunables.
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Set to "true" if you terminate TLS / proxy in front of overhearr
      # (nginx, Traefik, Caddy, Cloudflare). Required for secure cookies
      # to be set correctly when the upstream is HTTP.
      TRUST_PROXY: ${TRUST_PROXY:-false}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:5056/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
